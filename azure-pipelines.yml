trigger:
- master

pool:
  name: myagent

steps:

# Checkout source code
- checkout: self

# Verify Java
- script: |
    export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    export PATH=$JAVA_HOME/bin:$PATH

    java -version
    mvn -version
  displayName: 'Verify Java and Maven'

# SonarQube Prepare
- task: SonarQubePrepare@8
  inputs:
    SonarQube: 'sonarqube'
    scannerMode: 'other'

# Build and Analyze
- task: Maven@4
  displayName: 'Build and Analyze'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'Path'
    jdkDirectory: '/usr/lib/jvm/java-17-openjdk-amd64'
    sonarQubeRunAnalysis: true

# Publish Quality Gate
- task: SonarQubePublish@8
  inputs:
    pollingTimeoutSec: '300'

# Publish Artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)/target'
    ArtifactName: 'drop'
    publishLocation: 'Container'

# Docker Build
- task: Docker@2
  displayName: 'Build Image'
  inputs:
    containerRegistry: 'acr'
    repository: 'sampledemo'
    command: 'build'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)

# Trivy Scan
- script: |
    trivy image --severity HIGH,CRITICAL sampledemo.azurecr.io/sampledemo:$(Build.BuildId)
  displayName: 'Trivy Scan'

# Docker Push
- task: Docker@2
  displayName: 'Push Image'
  inputs:
    containerRegistry: 'acr'
    repository: 'sampledemo'
    command: 'push'
    tags: |
      $(Build.BuildId)

# Determine Target Slot
- script: |

    ACTIVE=$(cat /opt/sampledemo/active)

    if [ "$ACTIVE" = "blue" ]; then
      echo "Deploying to GREEN"
      echo "green" > /tmp/newslot
      echo "8081" > /tmp/newport
    else
      echo "Deploying to BLUE"
      echo "blue" > /tmp/newslot
      echo "8080" > /tmp/newport
    fi

  displayName: 'Determine Target Slot'

# Deploy New Version
- script: |

    SLOT=$(cat /tmp/newslot)
    PORT=$(cat /tmp/newport)

    docker rm -f sampledemo-$SLOT || true

    docker run -d \
      --name sampledemo-$SLOT \
      -p $PORT:8080 \
      sampledemo.azurecr.io/sampledemo:$(Build.BuildId)

  displayName: 'Deploy New Version'

# Health Check
- script: |

    PORT=$(cat /tmp/newport)

    echo "Waiting for startup..."
    sleep 20

    curl -f http://localhost:$PORT

  displayName: 'Health Check'

# Switch Nginx Traffic
- script: |

    PORT=$(cat /tmp/newport)

    sudo sed -i "s/server localhost:[0-9]*/server localhost:$PORT/" \
    /etc/nginx/conf.d/sampledemo.conf

    sudo nginx -t
    sudo systemctl reload nginx

  displayName: 'Switch Traffic'

# Update Active Slot
- script: |

    SLOT=$(cat /tmp/newslot)

    echo $SLOT | sudo tee /opt/sampledemo/active

  displayName: 'Mark Active Slot'

# Remove Old Slot
- script: |

    ACTIVE=$(cat /opt/sampledemo/active)

    if [ "$ACTIVE" = "blue" ]; then
      docker rm -f sampledemo-green || true
    else
      docker rm -f sampledemo-blue || true
    fi

  displayName: 'Cleanup Old Slot'

# Verification
- script: |

    echo "===== ACTIVE SLOT ====="
    cat /opt/sampledemo/active

    echo "===== RUNNING CONTAINERS ====="
    docker ps

    echo "===== NGINX ====="
    cat /etc/nginx/conf.d/sampledemo.conf

    curl -I http://localhost

  displayName: 'Verify Deployment'