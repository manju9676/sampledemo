# Starter pipeline

# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  name: myagent

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'stage 2'

- script: |
    echo building stage 3
  displayName: 'stage 3'

- task: Maven@4
  inputs:
    azureSubscription: 'Azure subscription 1(ddc45bc2-7a34-4943-8d1b-4aa187194509)'
    mavenPomFile: 'pom.xml'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'JDKVersion'
    mavenVersionOption: 'Default'
    mavenAuthenticateFeed: false
    effectivePomSkip: false
    sonarQubeRunAnalysis: false
- script: |
    pwd
    echo $(Build.SourcesDirectory)
    find . -name "*.war"
  displayName: 'Debug Workspace'

- task: Bash@3
  displayName: Deploy to Tomcat
  inputs:
    targetType: 'inline'
    script: |
      WAR_FILE=$(find $(Build.SourcesDirectory)/target -name "*.war" | head -1)

      echo "Deploying $WAR_FILE"

      curl --fail \
        -u admin:admin123 \
        -T "$WAR_FILE" \
        "http://localhost:8080/manager/text/deploy?path=/sample-app&update=true"