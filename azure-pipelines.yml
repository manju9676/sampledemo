trigger:
- master

pool:
  name: myagent

steps:

- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.17'
    mavenVersionOption: 'Default'

- script: |
    find $(Build.SourcesDirectory) -name "*.war"
    ls -ltr $(Build.SourcesDirectory)/target
  displayName: 'Verify WAR'

- task: TomcatDeployment@1
  inputs:
    TomcatUrl: 'http://20.41.218.73:8080'
    Username: 'admin'
    Password: 'admin@123'
    Warfile: '$(Build.SourcesDirectory)/target/*.war'
    Context: '/sample-app'
    ServerVersion: '7OrAbove'